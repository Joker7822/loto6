name: Loto6 Scrape and Backtest

# Uses Rakuten static backnumber scraper to avoid Mizuho 403 in CI.
# Default scrape mode is all history from the first available Loto6 draw month.
# All long-running verification steps commit/push resumable outputs incrementally.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      top_n:
        description: 'Predictions per draw'
        required: true
        default: '5'
      candidates:
        description: 'Candidate combinations per draw'
        required: true
        default: '3000'
      min_train_draws:
        description: 'Minimum past draws before first target draw'
        required: true
        default: '1'
      push_every:
        description: 'Commit and push every N newly verified draws'
        required: true
        default: '100'
      scrape_months:
        description: 'Recent months to scrape, or all for first draw onward'
        required: true
        default: 'all'
      max_draws:
        description: 'Optional debug limit. Empty/all means all remaining draws.'
        required: false
        default: ''

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: loto6-scrape-backtest-main
  cancel-in-progress: false

env:
  BRANCH_NAME: main
  TOP_N_DEFAULT: '5'
  CANDIDATES_DEFAULT: '3000'
  MIN_TRAIN_DRAWS_DEFAULT: '1'
  PUSH_EVERY_DEFAULT: '100'
  SCRAPE_MONTHS_DEFAULT: all

jobs:
  scrape-and-backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git config pull.rebase true
          git config rebase.autoStash true

      - name: Define workflow inputs
        run: |
          set -euo pipefail
          echo "TOP_N=${{ github.event.inputs.top_n || env.TOP_N_DEFAULT }}" >> "$GITHUB_ENV"
          echo "CANDIDATES=${{ github.event.inputs.candidates || env.CANDIDATES_DEFAULT }}" >> "$GITHUB_ENV"
          echo "MIN_TRAIN_DRAWS=${{ github.event.inputs.min_train_draws || env.MIN_TRAIN_DRAWS_DEFAULT }}" >> "$GITHUB_ENV"
          echo "PUSH_EVERY=${{ github.event.inputs.push_every || env.PUSH_EVERY_DEFAULT }}" >> "$GITHUB_ENV"
          echo "SCRAPE_MONTHS=${{ github.event.inputs.scrape_months || env.SCRAPE_MONTHS_DEFAULT }}" >> "$GITHUB_ENV"
          echo "MAX_DRAWS=${{ github.event.inputs.max_draws || '' }}" >> "$GITHUB_ENV"

      - name: Sync branch before work
        run: |
          set -e
          git fetch origin "$BRANCH_NAME" || true
          git rebase "origin/$BRANCH_NAME" || git rebase --abort || true

      - name: Scrape Loto6 CSV from Rakuten static pages
        run: |
          set -euo pipefail
          if [ -z "${SCRAPE_MONTHS}" ] || [ "${SCRAPE_MONTHS}" = "all" ] || [ "${SCRAPE_MONTHS}" = "ALL" ]; then
            python scrapingloto6.py --csv data/loto6.csv --all --sleep 2
          else
            python scrapingloto6.py --csv data/loto6.csv --months "${SCRAPE_MONTHS}" --sleep 2
          fi

      - name: Commit scraped CSV
        run: |
          set -e
          git add data/loto6.csv
          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
            exit 0
          fi
          git commit -m "Update scraped Loto6 CSV [skip ci]"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$BRANCH_NAME" || true
            git rebase "origin/$BRANCH_NAME" || true
            if git push origin "HEAD:$BRANCH_NAME"; then
              exit 0
            fi
            echo "CSV push failed attempt ${attempt}/5"
            sleep $((attempt * 3))
          done
          exit 1

      - name: Sync after CSV push
        run: |
          git fetch origin "$BRANCH_NAME" || true
          git rebase "origin/$BRANCH_NAME" || true

      - name: Run resumable no-leakage backtest and push every 100 draws
        env:
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com
        run: |
          set -euo pipefail
          CMD="python loto6.py backtest --csv data/loto6.csv --min-train-draws ${MIN_TRAIN_DRAWS} --top-n ${TOP_N} --candidates ${CANDIDATES} --resume --push-every ${PUSH_EVERY} --push-final"
          if [ -n "${MAX_DRAWS}" ] && [ "${MAX_DRAWS}" != "all" ] && [ "${MAX_DRAWS}" != "ALL" ]; then
            CMD="$CMD --max-draws '${MAX_DRAWS}'"
          fi
          echo "$CMD"
          eval "$CMD"

      - name: Sync after normal backtest pushes
        run: |
          git fetch origin "$BRANCH_NAME" || true
          git rebase "origin/$BRANCH_NAME" || true

      - name: Run third-prize no-leakage backtest
        env:
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com
        run: |
          set -euo pipefail
          CMD="python third_prize_backtest.py --csv data/loto6.csv --min-train-draws ${MIN_TRAIN_DRAWS} --top-n ${TOP_N} --output-dir outputs --resume --push-every ${PUSH_EVERY} --push-final"
          if [ -n "${MAX_DRAWS}" ] && [ "${MAX_DRAWS}" != "all" ] && [ "${MAX_DRAWS}" != "ALL" ]; then
            CMD="$CMD --max-draws '${MAX_DRAWS}'"
          fi
          echo "$CMD"
          eval "$CMD"

      - name: Sync after third-prize backtest pushes
        run: |
          git fetch origin "$BRANCH_NAME" || true
          git rebase "origin/$BRANCH_NAME" || true

      - name: Optimize third-prize parameters from backtest
        run: |
          set -euo pipefail
          python third_prize_parameter_optimizer.py \
            --result-csv outputs/backtest_3rd_target_result.csv \
            --draw-csv data/loto6.csv \
            --config-output outputs/third_prize_optimized_config.json \
            --report-output outputs/third_prize_optimization_report.csv
          python core5_performance.py \
            --result-csv outputs/backtest_3rd_target_result.csv \
            --output outputs/core5_performance.csv

      - name: Commit optimization and core5 performance before nested backtest
        run: |
          set -e
          git add \
            outputs/third_prize_optimized_config.json \
            outputs/third_prize_optimization_report.csv \
            outputs/core5_performance.csv
          if git diff --cached --quiet; then
            echo "No optimization/core5 changes to commit."
            exit 0
          fi
          LATEST_DRAW=$(python - <<'PY'
          import pandas as pd
          df = pd.read_csv('data/loto6.csv')
          print(int(df['draw_no'].max()))
          PY
          )
          git commit -m "Update third-prize optimization and core5 performance after draw ${LATEST_DRAW} [skip ci]"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$BRANCH_NAME" || true
            git rebase "origin/$BRANCH_NAME" || true
            if git push origin "HEAD:$BRANCH_NAME"; then
              exit 0
            fi
            echo "Optimization/core5 push failed attempt ${attempt}/5"
            sleep $((attempt * 3))
          done
          exit 1

      - name: Sync after optimization push
        run: |
          git fetch origin "$BRANCH_NAME" || true
          git rebase "origin/$BRANCH_NAME" || true

      - name: Run nested optimized third-prize backtest with incremental push
        env:
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com
        run: |
          set -euo pipefail
          CMD="python nested_third_prize_backtest.py --csv data/loto6.csv --min-train-draws 1 --top-n ${TOP_N} --output-dir outputs --push-every ${PUSH_EVERY} --push-final"
          if [ -n "${MAX_DRAWS}" ] && [ "${MAX_DRAWS}" != "all" ] && [ "${MAX_DRAWS}" != "ALL" ]; then
            CMD="$CMD --max-draws '${MAX_DRAWS}'"
          fi
          echo "$CMD"
          eval "$CMD"

      - name: Sync after nested backtest pushes
        run: |
          git fetch origin "$BRANCH_NAME" || true
          git rebase "origin/$BRANCH_NAME" || true

      - name: Generate CSV-aware latest Loto6 predictions
        run: |
          set -euo pipefail
          python csv_aware_predict.py \
            --repo-root . \
            -n "${TOP_N}" \
            --candidates "${CANDIDATES}" \
            --standard-output outputs/latest_predictions.csv \
            --third-output outputs/latest_predictions_3rd_target_raw.csv \
            --context-output outputs/csv_aware_prediction_context.json \
            --include-outputs
          python third_prize_diversified_predict.py \
            --repo-root . \
            -n "${TOP_N}" \
            --output outputs/latest_predictions_3rd_target.csv \
            --context outputs/latest_predictions_3rd_target_context.json \
            --config outputs/third_prize_optimized_config.json \
            --core5-performance outputs/core5_performance.csv \
            --include-outputs

      - name: Commit latest predictions, third-prize backtests, and optimization
        run: |
          set -e
          git add \
            outputs/latest_predictions.csv \
            outputs/latest_predictions_3rd_target.csv \
            outputs/latest_predictions_3rd_target_raw.csv \
            outputs/latest_predictions_3rd_target_context.json \
            outputs/csv_aware_prediction_context.json \
            outputs/third_prize_optimized_config.json \
            outputs/third_prize_optimization_report.csv \
            outputs/core5_performance.csv \
            outputs/nested_3rd_target_result.csv \
            outputs/nested_3rd_target_summary.csv \
            outputs/nested_3rd_target_progress.json \
            outputs/backtest_3rd_target_result.csv \
            outputs/backtest_3rd_target_summary.csv \
            outputs/backtest_3rd_target_progress.json \
            outputs/backtest_result.csv \
            outputs/backtest_summary.csv \
            outputs/backtest_progress.json
          if git diff --cached --quiet; then
            echo "No latest prediction, optimization, or backtest changes to commit."
            exit 0
          fi
          LATEST_DRAW=$(python - <<'PY'
          import pandas as pd
          df = pd.read_csv('data/loto6.csv')
          print(int(df['draw_no'].max()))
          PY
          )
          git commit -m "Improve optimized third-prize Loto6 predictions after draw ${LATEST_DRAW} [skip ci]"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$BRANCH_NAME" || true
            git rebase "origin/$BRANCH_NAME" || true
            if git push origin "HEAD:$BRANCH_NAME"; then
              exit 0
            fi
            echo "Prediction push failed attempt ${attempt}/5"
            sleep $((attempt * 3))
          done
          exit 1

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto6-scrape-backtest-outputs
          path: |
            data/loto6.csv
            outputs/backtest_result.csv
            outputs/backtest_summary.csv
            outputs/backtest_progress.json
            outputs/backtest_3rd_target_result.csv
            outputs/backtest_3rd_target_summary.csv
            outputs/backtest_3rd_target_progress.json
            outputs/third_prize_optimized_config.json
            outputs/third_prize_optimization_report.csv
            outputs/core5_performance.csv
            outputs/nested_3rd_target_result.csv
            outputs/nested_3rd_target_summary.csv
            outputs/nested_3rd_target_progress.json
            outputs/latest_predictions.csv
            outputs/latest_predictions_3rd_target.csv
            outputs/latest_predictions_3rd_target_raw.csv
            outputs/latest_predictions_3rd_target_context.json
            outputs/csv_aware_prediction_context.json
          if-no-files-found: ignore
