name: Loto6 Scrape and Backtest

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/scrape_backtest.yml'
  workflow_dispatch:
    inputs:
      top_n:
        description: 'Predictions per draw'
        required: true
        default: '5'
      candidates:
        description: 'Candidate combinations per draw'
        required: true
        default: '3000'
      min_train_draws:
        description: 'Minimum past draws before first target draw'
        required: true
        default: '1'
      push_every:
        description: 'Commit and push every N newly verified draws'
        required: true
        default: '100'
      max_draws:
        description: 'Optional debug limit. Empty means all remaining draws.'
        required: false
        default: ''

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: loto6-scrape-backtest-main
  cancel-in-progress: false

jobs:
  scrape-and-backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Scrape latest Loto6 CSV
        run: |
          python loto6.py update --csv data/loto6.csv

      - name: Commit scraped CSV
        run: |
          set -e
          git add data/loto6.csv
          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
            exit 0
          fi
          git commit -m "Update scraped Loto6 CSV [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin main || true
            git rebase origin/main || true
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "CSV push failed attempt ${attempt}/3"
            sleep $((attempt * 2))
          done
          exit 1

      - name: Run resumable no-leakage backtest and push every 100 draws
        env:
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com
        run: |
          TOP_N="${{ inputs.top_n || '5' }}"
          CANDIDATES="${{ inputs.candidates || '3000' }}"
          MIN_TRAIN_DRAWS="${{ inputs.min_train_draws || '1' }}"
          PUSH_EVERY="${{ inputs.push_every || '100' }}"
          CMD="python loto6.py backtest --csv data/loto6.csv --min-train-draws ${MIN_TRAIN_DRAWS} --top-n ${TOP_N} --candidates ${CANDIDATES} --resume --push-every ${PUSH_EVERY} --push-final"
          if [ -n "${{ inputs.max_draws }}" ]; then
            CMD="$CMD --max-draws '${{ inputs.max_draws }}'"
          fi
          echo "$CMD"
          eval "$CMD"

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto6-scrape-backtest-outputs
          path: |
            data/loto6.csv
            outputs/backtest_result.csv
            outputs/backtest_summary.csv
            outputs/backtest_progress.json
          if-no-files-found: ignore
