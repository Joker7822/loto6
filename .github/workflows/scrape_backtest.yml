name: Loto6 Scrape and Backtest

# Uses Rakuten static backnumber scraper to avoid Mizuho 403 in CI.
# Default scrape mode is all history from the first available Loto6 draw month.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      top_n:
        description: 'Predictions per draw'
        required: true
        default: '5'
      candidates:
        description: 'Candidate combinations per draw'
        required: true
        default: '3000'
      min_train_draws:
        description: 'Minimum past draws before first target draw'
        required: true
        default: '1'
      push_every:
        description: 'Commit and push every N newly verified draws'
        required: true
        default: '100'
      scrape_months:
        description: 'Recent months to scrape, or all for first draw onward'
        required: true
        default: 'all'
      max_draws:
        description: 'Optional debug limit. Empty/all means all remaining draws.'
        required: false
        default: ''

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: loto6-scrape-backtest-main
  cancel-in-progress: false

jobs:
  scrape-and-backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Scrape Loto6 CSV from Rakuten static pages
        run: |
          SCRAPE_MONTHS="${{ inputs.scrape_months || 'all' }}"
          if [ -z "${SCRAPE_MONTHS}" ] || [ "${SCRAPE_MONTHS}" = "all" ] || [ "${SCRAPE_MONTHS}" = "ALL" ]; then
            python scrapingloto6.py --csv data/loto6.csv --all --sleep 2
          else
            python scrapingloto6.py --csv data/loto6.csv --months "${SCRAPE_MONTHS}" --sleep 2
          fi

      - name: Commit scraped CSV
        run: |
          set -e
          git add data/loto6.csv
          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
            exit 0
          fi
          git commit -m "Update scraped Loto6 CSV [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin main || true
            git rebase origin/main || true
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "CSV push failed attempt ${attempt}/3"
            sleep $((attempt * 2))
          done
          exit 1

      - name: Run resumable no-leakage backtest and push every 100 draws
        env:
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com
        run: |
          TOP_N="${{ inputs.top_n || '5' }}"
          CANDIDATES="${{ inputs.candidates || '3000' }}"
          MIN_TRAIN_DRAWS="${{ inputs.min_train_draws || '1' }}"
          PUSH_EVERY="${{ inputs.push_every || '100' }}"
          MAX_DRAWS="${{ inputs.max_draws }}"
          CMD="python loto6.py backtest --csv data/loto6.csv --min-train-draws ${MIN_TRAIN_DRAWS} --top-n ${TOP_N} --candidates ${CANDIDATES} --resume --push-every ${PUSH_EVERY} --push-final"
          if [ -n "${MAX_DRAWS}" ] && [ "${MAX_DRAWS}" != "all" ] && [ "${MAX_DRAWS}" != "ALL" ]; then
            CMD="$CMD --max-draws '${MAX_DRAWS}'"
          fi
          echo "$CMD"
          eval "$CMD"

      - name: Generate latest Loto6 predictions
        run: |
          TOP_N="${{ inputs.top_n || '5' }}"
          CANDIDATES="${{ inputs.candidates || '3000' }}"
          python loto6.py predict --csv data/loto6.csv -n "${TOP_N}" --candidates "${CANDIDATES}" --output outputs/latest_predictions.csv
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          import pandas as pd

          csv_path = Path('data/loto6.csv')
          pred_path = Path('outputs/latest_predictions.csv')
          meta_path = Path('outputs/latest_predictions_context.json')

          draws = pd.read_csv(csv_path).sort_values('draw_no')
          preds = pd.read_csv(pred_path)
          latest = draws.iloc[-1]

          preds.insert(0, 'generated_at_utc', datetime.now(timezone.utc).isoformat())
          preds.insert(1, 'source_draws', len(draws))
          preds.insert(2, 'trained_through_draw_no', int(latest['draw_no']))
          preds.insert(3, 'trained_through_date', str(latest['date']))
          preds.insert(4, 'target', f"after_draw_{int(latest['draw_no'])}")
          preds.to_csv(pred_path, index=False, encoding='utf-8')

          meta = {
              'generated_at_utc': datetime.now(timezone.utc).isoformat(),
              'source_csv': str(csv_path),
              'prediction_csv': str(pred_path),
              'source_draws': int(len(draws)),
              'trained_through_draw_no': int(latest['draw_no']),
              'trained_through_date': str(latest['date']),
              'target': f"after_draw_{int(latest['draw_no'])}",
              'note': 'Predictions are generated only from the CSV available at execution time.'
          }
          meta_path.write_text(json.dumps(meta, ensure_ascii=False, indent=2), encoding='utf-8')
          print(preds.to_string(index=False))
          print(meta_path.read_text(encoding='utf-8'))
          PY

      - name: Commit latest predictions
        run: |
          set -e
          git add outputs/latest_predictions.csv outputs/latest_predictions_context.json
          if git diff --cached --quiet; then
            echo "No latest prediction changes to commit."
            exit 0
          fi
          LATEST_DRAW=$(python - <<'PY'
          import pandas as pd
          df = pd.read_csv('data/loto6.csv')
          print(int(df['draw_no'].max()))
          PY
          )
          git commit -m "Update latest Loto6 predictions after draw ${LATEST_DRAW} [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin main || true
            git rebase origin/main || true
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Prediction push failed attempt ${attempt}/3"
            sleep $((attempt * 2))
          done
          exit 1

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto6-scrape-backtest-outputs
          path: |
            data/loto6.csv
            outputs/backtest_result.csv
            outputs/backtest_summary.csv
            outputs/backtest_progress.json
            outputs/latest_predictions.csv
            outputs/latest_predictions_context.json
          if-no-files-found: ignore
